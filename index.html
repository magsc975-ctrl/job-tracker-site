<style>
  :root{--surface-1:#fcfcfb;--plane:#f9f9f7;--text-primary:#0b0b0b;--text-secondary:#52514e;

  @media (prefers-color-scheme:dark){:root{--surface-1:#1a1a19;--plane:#0d0d0d;--text-primary:#fff;
    --text-secondary:#c3c2b7;--text-muted:#898781;--gridline:#2c2c2a;--border:rgba(255,255,255,.10);
    --good:#0ca30c;--good-bg:rgba(12,163,12,.18);--warn:#eab84a;--warn-bg:rgba(250,178,25,.22);
    --muted-tier:#a3a29c;--muted-tier-bg:rgba(163,162,156,.16);--accent:#3987e5;
    --accent-bg:rgba(57,135,229,.18);--row-hover:rgba(255,255,255,.045);--shadow:0 1px 2px rgba(0,0,0,.3);}}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{background:var(--plane);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    font-size:14px;line-height:1.45;padding:24px 20px 60px}
  .wrap{max-width:1180px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  h1{font-size:20px;font-weight:700;margin:0;letter-spacing:-.01em}
  .updated{color:var(--text-muted);font-size:12.5px}
  .tiles{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
  .tile{background:var(--surface-1);border:1px solid var(--border);border-radius:10px;padding:12px 14px;box-shadow:var(--shadow)}
  .tile .val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1}
  .tile .lbl{color:var(--text-secondary);font-size:11.5px;margin-top:3px;text-transform:uppercase;letter-spacing:.03em}
  .tile.a .val{color:var(--good)}.tile.b .val{color:var(--warn)}.tile.c .val{color:var(--muted-tier)}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--surface-1);
    border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:14px;box-shadow:var(--shadow)}
  .controls select,.controls input[type=search]{font:inherit;padding:6px 10px;border-radius:7px;
    border:1px solid var(--border);background:var(--plane);color:var(--text-primary)}
  .controls input[type=search]{flex:1;min-width:160px}
  .controls .count{margin-left:auto;color:var(--text-muted);font-size:12.5px;white-space:nowrap}
  table{width:100%;border-collapse:collapse;background:var(--surface-1);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  thead th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-secondary);
    font-weight:600;padding:9px 10px;border-bottom:1px solid var(--gridline);cursor:pointer;white-space:nowrap;user-select:none}
  thead th:hover{color:var(--text-primary)}
  thead th.sorted::after{content:attr(data-arrow);margin-left:4px;color:var(--accent)}
  tbody td{padding:8px 10px;border-bottom:1px solid var(--gridline);vertical-align:top}
  tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:var(--row-hover)}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
  .fit-A{background:var(--good-bg);color:var(--good)}.fit-B{background:var(--warn-bg);color:var(--warn)}
  .fit-C{background:var(--muted-tier-bg);color:var(--muted-tier)}
  .pill-loc{background:var(--accent-bg);color:var(--accent)}
  .company{font-weight:600}.role{color:var(--text-secondary)}
  .apply-link{display:inline-block;padding:4px 10px;border-radius:7px;background:var(--accent);color:#fff;
    text-decoration:none;font-weight:600;font-size:12.5px}
  .apply-link:hover{opacity:.85}
  .status{color:var(--text-secondary);font-size:12.5px}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
  @media (max-width:900px){.tiles{grid-template-columns:repeat(3,1fr)}table thead{display:none}
    table,tbody,tr,td{display:block;width:100%}tbody tr{border-bottom:1px solid var(--gridline);padding:10px 0}
    tbody td{border-bottom:none;padding:3px 10px}
    tbody td::before{content:attr(data-label);display:inline-block;width:96px;color:var(--text-muted);font-size:11.5px}}
  @media (max-width:560px){.tiles{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<div class="wrap">
  <header><h1>Maggie — Job Tracker</h1>

  <table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table>

</div>
<script>
const DATA=[{"Company": "Vert", "Role": "Marketing Associate", "Fit": "A", "Sheet": "Brand Content", "Category": "social", "Location": "NYC", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "$85000-$120000", "Posted": "2026-02-05", "Status": "", "Apply": "https://jobs.weekday.works/vert-marketing-associate"}, {"Company": "Topline Pro", "Role": "Content Marketing Specialist", "Fit": "B", "Sheet": "Brand Content", "Category": "content", "Location": "Brooklyn", "Remote": "Hybrid", "Seniority": "Mid-level", "Comp": "$100000-$120000", "Posted": "2026-04-28", "Status": "", "Apply": "https://jobs.ashbyhq.com/topline-pro/1411add3-53d4-401e-bec2-05ded95ea412"}, {"Company": "Good Inside", "Role": "Social Media Associate", "Fit": "B", "Sheet": "Brand Content", "Category": "social", "Location": "NYC", "Remote": "Remote", "Seniority": "Entry level", "Comp": "$75000-$85000", "Posted": "2026-05-15", "Status": "", "Apply": "https://www.goodinside.com/careers/"}, {"Company": "Pickle", "Role": "Social Media Coordinator", "Fit": "B", "Sheet": "Brand Content", "Category": "social", "Location": "NYC", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "$70000-$90000", "Posted": "2026-07-10", "Status": "", "Apply": "https://jobs.ashbyhq.com/shoponpickle/7d27d481-5ce6-4823-9a99-6f14f9a4fece"}, {"Company": "Bubble Skincare", "Role": "Coordinator Social Media Content", "Fit": "B", "Sheet": "Brand Content", "Category": "content", "Location": "NYC", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "$65000-$85000", "Posted": "2026-03-02", "Status": "", "Apply": "https://job-boards.greenhouse.io/bubbleskincare"}, {"Company": "Rilla", "Role": "Content Marketing Manager", "Fit": "C", "Sheet": "Brand Content", "Category": "content", "Location": "NYC", "Remote": "Onsite", "Seniority": "Mid-level", "Comp": "Unlisted", "Posted": "2026-07-19", "Status": "", "Apply": "https://jobs.ashbyhq.com/rilla/47e06224-d21b-4f03-8c49-b2e88300707d"}, {"Company": "Stepful", "Role": "Social Media ", "Category": "growth", "Location": "NYC", "Remote": "Remote", "Seniority": "Entry level", "Comp": "$75000-$115000", "Posted": "2026-07-19", "Status": "", "Apply": "https://replicahq.com/careers"}, {"Company": "Via", "Role": "Consumer Growth Marketing Associate", "Fit": "B", "Sheet": "Growth", "Category": "growth", "Location": "NYC", "Remote": "Remote", "Seniority": "Entry level", "Comp": "$94300-$137000", "Posted": "2026-07-19", "Status": "", "Apply": "https://job-boards.greenhouse.io/via/jobs/8383254002"}, {"Company": "GlossGenius", "Role": "Growth Marketing Associate", "Fit": "B", "Sheet": "Growth", "Category": "growth", "Location": "NYC", "Remote": "Hybrid", "Seniority": "Entry level", "Comp": "$110000-$130000", "Posted": "2026-07-19", "Status": "", "Apply": "https://www.builtinnyc.com/job/growth-marketing-associate/3966507"}, {"Company": "Revivn", "Role": "Growth Marketing Associate", "Fit": "B", "Sheet": "Growth", "Category": "growth", "Location": "Brooklyn", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "$80000-$100000", "Posted": "2026-07-19", "Status": "", "Apply": "https://job-boards.greenhouse.io/revivn/jobs/4723341007"}, {"Company": "theSkimm", "Role": "Growth Marketing Associate", "Fit": "B", "Sheet": "Growth", "Category": "growth", "Location": "NYC", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "Unlisted", "Posted": "2026-07-17", "Status": "", "Apply": "https://www.builtinnyc.com/job/marketing/growth-marketing-associate/90172"}, {"Company": "ShopMy", "Role": "Associate Growth Marketing", "Fit": "B", "Sheet": "Growth", "Category": "growth", "Location": "NYC", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "Unlisted", "Posted": "2026-07-19", "Status": "", "Apply": "https://www.builtinnyc.com/job/associate-growth-marketing/6482760"}, {"Company": "Bravi", "Role": "Founding GTM", "Fit": "C", "Sheet": "Growth", "Category": "growth", "Location": "NYC", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "$120000-$190000", "Posted": "2026-07-19", "Status": "", "Apply": "https://www.ycombinator.com/companies/bravi/jobs/tyWjtGk-bravi-yc-f25-founding-gtm-new-york"}, {"Company": "Doji", "Role": "Marketing Lead", "Fit": "C", "Sheet": "Growth", "Category": "growth", "Location": "NYC", "Remote": "Onsite", "Seniority": "Mid-level", "Comp": "Unlisted", "Posted": "2026-07-20", "Status": "", "Apply": "https://jobs.ashbyhq.com/doji/dbb13c73-a391-4432-a3d3-c5bc1ba8b4ab"}, {"Company": "Emerge Career", "Role": "Founding Growth Marketer", "Fit": "B", "Sheet": "Growth", "Category": "growth", "Location": "NYC", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "Unlisted", "Posted": "2026-07-20", "Status": "", "Apply": "https://www.ycombinator.com/companies/emerge-career/jobs/v0S1AEG-founding-growth-marketer"}, {"Company": "Coast", "Role": "Growth Marketer", "Fit": "B", "Sheet": "Growth", "Category": "growth", "Location": "NYC", "Remote": "Onsite", "Seniority": "Entry level", "Comp": "Unlisted", "Posted": "2026-07-20", "Status": "", "Apply": "https://www.ycombinator.com/companies/coast/jobs/t4lAqn5-growth-marketer-nyc"}], STATS={"total": 22, "fitA": 2, "fitB": 17, "fitC": 3, "remote": 6, "applied": 0}, CFG={"columns": ["Company", "Role", "Fit", "Sheet", "Category", "Location", "Remote", "Seniority", "Comp", "Posted", "Status", "Apply"], "fitCol": "Fit", "remoteCol": "Remote", "statusCol": "Status", "searchCols": ["Company", "Role"]};
const ONSITE=new Set(["","onsite","on-site","in-office","in office","no","n/a"]);
const isRemote=r=>!ONSITE.has(((r[CFG.remoteCol]||"")+"").trim().toLowerCase());
tileTotal.textContent=STATS.total; tileA.textContent=STATS.fitA; tileB.textContent=STATS.fitB;
tileC.textContent=STATS.fitC; tileRemote.textContent=STATS.remote; tileApplied.textContent=STATS.applied;
document.getElementById('thead').innerHTML='<tr>'+CFG.columns.map(c=>`<th data-key="${c}">${c}</th>`).join('')+'</tr>';
const sheetSel=document.getElementById('fSheet');
[...new Set(DATA.map(r=>r.Sheet))].forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sheetSel.appendChild(o)});
const statusSel=document.getElementById('fStatus');
[...new Set(DATA.map(r=>((r[CFG.statusCol]||'')+'').trim()).filter(Boolean))].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;statusSel.appendChild(o)});
let sortKey=null, sortDir=1;
const esc=s=>((s||'')+'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function cell(r,c){const v=r[c]||'';
  if(c===CFG.fitCol) return `<span class="badge fit-${esc((v+'').trim())}">${esc(v)}</span>`;
  if(c==='Apply') return v?`<a class="apply-link" href="${esc(v)}" target="_blank" rel="noopener">Apply →</a>`:'';
  if(c===CFG.remoteCol&&isRemote(r)) return `<span class="badge pill-loc">${esc(v)}</span>`;
  if(c==='Company') return `<span class="company">${esc(v)}</span>`;
  if(c==='Role') return `<span class="role">${esc(v)}</span>`;
  return esc(v);}
function render(){
  const sheet=sheetSel.value, fit=document.getElementById('fFit').value,
        rem=document.getElementById('fRemote').value, status=statusSel.value,
        q=document.getElementById('fSearch').value.trim().toLowerCase();
  let f=DATA.filter(r=>{
    if(sheet&&r.Sheet!==sheet)return false;
    if(fit&&((r[CFG.fitCol]||'')+'').trim()!==fit)return false;
    if(rem==='remote'&&!isRemote(r))return false;
    if(rem==='onsite'&&isRemote(r))return false;
    if(status&&((r[CFG.statusCol]||'')+'').trim()!==status)return false;
    if(q&&!CFG.searchCols.map(c=>(r[c]||'')).join(' ').toLowerCase().includes(q))return false;
    return true;});
  if(sortKey)f.sort((a,b)=>((a[sortKey]||'')+'').localeCompare(((b[sortKey]||'')+''))*sortDir);
  document.getElementById('tbody').innerHTML=f.map(r=>'<tr>'+CFG.columns.map(c=>`<td data-label="${c}">${cell(r,c)}</td>`).join('')+'</tr>').join('');

}
document.getElementById('thead').addEventListener('click',e=>{const th=e.target.closest('th');if(!th)return;
  const k=th.dataset.key; if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=1;}

  th.classList.add('sorted'); th.dataset.arrow=sortDir===1?'▲':'▼'; render();});

render();
